<section class="note-list-card">
  <header class="section-header">
    <h2>Saved notes</h2>
    <p>Review your notes and remove the ones you no longer need.</p>
  </header>

  <ng-container *ngIf="notes$ | async as notes">
    <div class="note-list-grid" *ngIf="notes.length > 0; else emptyState">
      <article class="note-item" *ngFor="let note of notes">
        <div class="note-content">
          <h3>{{ note.title }}</h3>
          <p>
            {{ note.content.substring(0, 50) }}
            {{ note.content.length > 50 ? "..." : "" }}
          </p>
        </div>
        <div class="note-actions">
          <a
            class="secondary-btn"
            [routerLink]="['/notes', note.id]"
            rel="noopener noreferrer"
          >
            View
          </a>
          <a class="primary-btn" [routerLink]="['/notes', note.id, 'edit']"
            >Edit</a
          >
          <button
            type="button"
            class="danger-btn"
            (click)="openDialog(note.id, note.title)"
          >
            Delete
          </button>
          <div class="dialog-backdrop" *ngIf="showDialog">
            <div class="dialog-box">
              <h3>Delete Note</h3>

              <p>
                Are you sure you want to delete
                <strong>"{{ noteTitleToDelete }}"</strong>?
              </p>

              <div class="dialog-actions">
                <button class="secondary-btn" (click)="closeDialog()">
                  Cancel
                </button>
                <button class="danger-btn" (click)="confirmDelete()">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </article>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <p class="empty-state">No notes yet. Add your first note above.</p>
  </ng-template>
</section>
